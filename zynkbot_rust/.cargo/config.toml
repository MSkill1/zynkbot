# Cargo configuration for maximum CPU compatibility
# This ensures the binary works on all x86-64 CPUs, not just modern ones with AVX2/AVX512

[build]
# Compile for generic x86-64 baseline (no AVX2, AVX512, or other advanced features)
# This ensures compatibility with older CPUs from ~2003 onwards
rustflags = ["-C", "target-cpu=x86-64"]

[target.x86_64-pc-windows-msvc]
# Windows-specific: Use baseline x86-64 instructions only
rustflags = ["-C", "target-cpu=x86-64"]

[target.x86_64-unknown-linux-gnu]
# Linux-specific: Use baseline x86-64 instructions only
rustflags = ["-C", "target-cpu=x86-64"]

[target.x86_64-apple-darwin]
# macOS-specific: Use baseline x86-64 instructions only
rustflags = ["-C", "target-cpu=x86-64"]

[target.aarch64-linux-android]
linker = "/home/matt/Android/Sdk/ndk/30.0.15729638/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android26-clang"
ar = "/home/matt/Android/Sdk/ndk/30.0.15729638/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"
# Enable fp16 arithmetic — required by candle's gemm dependency; supported on all modern Android
# phones (ARMv8.2-A, i.e. Snapdragon 730+ / Dimensity / Exynos 9 series and later, ~2018+)
rustflags = ["-C", "target-feature=+fullfp16,+fp16"]

[target.armv7-linux-androideabi]
linker = "/home/matt/Android/Sdk/ndk/30.0.15729638/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi26-clang"
ar = "/home/matt/Android/Sdk/ndk/30.0.15729638/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"

[target.i686-linux-android]
linker = "/home/matt/Android/Sdk/ndk/30.0.15729638/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android26-clang"
