name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            args: ''
          - platform: windows-latest
            args: ''
          # macOS — uncomment to add:
          # - platform: macos-latest
          #   args: '--target aarch64-apple-darwin'  # Apple Silicon
          # - platform: macos-latest
          #   args: '--target x86_64-apple-darwin'   # Intel

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: zynkbot_rust/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        # macOS cross-compile targets — uncomment if adding macOS runners:
        # with:
        #   targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: zynkbot_rust/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install frontend dependencies
        working-directory: zynkbot_rust
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: zynkbot_rust
          tagName: ${{ github.ref_name }}
          releaseName: Zynkbot ${{ github.ref_name }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/MSkill1/zynkbot/blob/main/CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
